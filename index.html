<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СНТ Энергосад 2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
  overflow-x:hidden;
  font-family:'Inter',sans-serif;
  background:#f4f7fb;
  color:#1f2d3d;
}

/* ===== ШАПКА ===== */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  background:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.05);
  z-index:1000;
}

.logo{
  font-weight:700;
  font-size:18px;
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
  user-select:none;
}

/* ===== HERO ===== */
.hero{
  margin-top:65px;
  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600&q=80");
  background-size:cover;
  background-position:center;
  padding:90px 20px;
  text-align:center;
  color:white;
}

.hero h1{
  font-size:22px;
  margin:0;
}

/* ===== КОНТЕНТ ===== */
.container{
  max-width:1000px;
  margin:40px auto;
  padding:0 20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 12px 30px rgba(0,0,0,0.06);
  margin-bottom:20px;
}

/* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:260px;
  height:100%;
  background:white;
  padding:20px;
  box-shadow:4px 0 20px rgba(0,0,0,0.15);
  transform:translateX(-100%); /* скрыто */
  transition:transform 0.3s ease;
  z-index:2000;
}

.sidebar.active{
  transform:translateX(0);
}

.sidebar a{
  display:block;
  text-decoration:none;
  padding:12px;
  margin-bottom:8px;
  border-radius:8px;
  background:#eef3ff;
  color:#2e4c9a;
}

.sidebar a:hover{
  background:#2e7d32;
  color:white;
}

/* Затемнение */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:1500;
}

.overlay.active{
  display:block;
}

/* ===== ДЕСКТОП ===== */
@media(min-width:900px){

  .menu-btn{
    display:none;
  }

  .sidebar{
    display:none;
  }
}
</style>

<script>
function openMenu(){
  document.getElementById("sidebar").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}
</script>

</head>
<body>

<div class="navbar">
  <div class="logo">СНТ «Энергосад 2»</div>
  <div class="menu-btn" onclick="openMenu()">☰</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="#about" onclick="closeMenu()">О СНТ</a>
  <a href="#news" onclick="closeMenu()">Новости</a>
  <a href="#documents" onclick="closeMenu()">Документы</a>
  <a href="#contact" onclick="closeMenu()">Контакты</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="hero">
  <h1>Официальный портал СНТ</h1>
</div>

<div class="container">

<div id="about" class="card">
  Современный портал для управления и информирования собственников.
</div>

<div id="news" class="card">
  19 марта 2026 года состоится собрание собственников.
</div>

<div id="documents" class="card">
  Устав СНТ<br>
  Протоколы собраний<br>
  Финансовые отчёты
</div>

<div id="contact" class="card">
  Телефон: +7 912 111 22 33<br>
  Сбербанк СБП
</div>

</div>

</body>
</html>
